# Local hooks delegate to the tools already pinned in pyproject.toml, so hook
# versions never drift from CI. Install with: uv run pre-commit install
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (lint)
        entry: uv run ruff check --fix
        language: system
        types: [python]
        require_serial: true
      - id: ruff-format
        name: ruff (format)
        entry: uv run ruff format
        language: system
        types: [python]
        require_serial: true
      - id: mypy
        name: mypy
        entry: uv run mypy src/mcpg
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
      - id: bandit
        name: bandit (sast)
        # Match CI flags exactly so a clean local commit also passes
        # `security` in .github/workflows/ci.yml. Bandit doesn't
        # auto-discover [tool.bandit] from pyproject.toml; the skips
        # have to be passed on the command line.
        entry: uv run bandit -r src/mcpg --skip B101,B608,B110 -ll
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

